<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0069aa"/>
      <stop offset="100%" stop-color="#06b0cc"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="750" fill="url(#g)"/>
  <rect width="1200" height="750" fill="url(#grid)"/>
  <g transform="translate(600 340)" text-anchor="middle" font-family="DM Mono, monospace" fill="white">
    <text font-size="78" font-weight="700" letter-spacing="2">{NAME}</text>
    <text y="64" font-size="22" opacity="0.85" letter-spacing="3">SCREENSHOT &#x2022; PLACEHOLDER</text>
    <text y="120" font-size="16" opacity="0.6">Remplace ce fichier par ta vraie capture d'écran</text>
  </g>
  <g transform="translate(600 530)" text-anchor="middle" fill="white" opacity="0.4">
    <circle cx="-20" cy="0" r="4"/>
    <circle cx="0" cy="0" r="4"/>
    <circle cx="20" cy="0" r="4"/>
  </g>
</svg>
